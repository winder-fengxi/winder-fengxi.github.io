<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静态文件存储</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; line-height: 1.6; }
        h1 { border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
        .directory-list { list-style: none; padding: 0; }
        .directory-list li { margin: 0.5rem 0; }
        .directory-list a { text-decoration: none; color: #0366d6; font-size: 1.1rem; }
        .directory-list a:hover { text-decoration: underline; }
        .folder-icon { margin-right: 0.5rem; }
    </style>
</head>
<body>
    <h1>静态文件仓库</h1>
    <p>该仓库用于存储静态资源文件。</p>
    
    <h2>目录结构</h2>
    <ul class="directory-list">
        <li><span class="folder-icon">📁</span><a href="images/">images/</a> - 图片资源</li>
        <li><span class="folder-icon">📁</span><a href="css/">css/</a> - 样式表文件</li>
        <li><span class="folder-icon">📁</span><a href="js/">js/</a> - JavaScript 脚本</li>
        <li><span class="folder-icon">📁</span><a href="files/">files/</a> - 其他文档和文件</li>
    </ul>

    <p><em>注意：请将文件上传到对应目录后，通过 GitHub Pages URL 访问。</em></p>
</body>
</html>
